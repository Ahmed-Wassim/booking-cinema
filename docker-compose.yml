services:
  app:
    build: .
    container_name: cinema_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor # Fast native volume — avoids slow Windows FS for vendor/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cinema

  nginx:
    image: nginx:alpine
    container_name: cinema_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor # Nginx needs vendor/ too (for public assets resolution)
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - cinema

  postgres:
    image: postgres:16-alpine
    container_name: cinema_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - cinema
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d cinema" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: cinema_redis
    restart: unless-stopped
    networks:
      - cinema
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  cinema:
    driver: bridge

volumes:
  postgres_data:
  vendor_data:
