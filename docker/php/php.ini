; Development PHP settings
memory_limit=256M
upload_max_filesize=64M
post_max_size=64M
max_execution_time=60

; Enable opcache even in dev — critical for performance on Docker/Windows.
; validate_timestamps=1 + revalidate_freq=0 means PHP checks for file changes
; on every request, so your code edits are still reflected immediately.
opcache.enable=1
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
